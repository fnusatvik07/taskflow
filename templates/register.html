<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Register · TaskFlow</title>
  <style>
    body { font-family: -apple-system, system-ui, sans-serif; max-width: 420px;
           margin: 48px auto; color: #1f1e1d; }
    h1 { color: #d97757; }
    label { display: block; margin: 12px 0 4px; }
    input { width: 100%; padding: 8px; box-sizing: border-box; }
    button { margin-top: 16px; padding: 10px 18px; background: #d97757;
             color: white; border: none; border-radius: 6px; cursor: pointer; }
  </style>
</head>
<body>
  <h1>Create your account</h1>
  <!-- Bug: you can submit this form completely empty and it still works. -->
  <form method="post" action="/register">
    <label>Username</label>
    <input name="username" />
    <label>Email</label>
    <input name="email" />
    <label>Password</label>
    <input name="password" type="password" />
    <button type="submit">Register</button>
  </form>
</body>
</html>
